<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc143c;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff4655;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="150" cy="150" r="145" fill="url(#bg)" stroke="url(#border)" stroke-width="10"/>

  <!-- Person silhouette -->
  <g fill="#b0b0b0" opacity="0.7">
    <!-- Head -->
    <circle cx="150" cy="100" r="35"/>
    <!-- Body -->
    <path d="M115 135 Q150 155 185 135 L185 220 Q150 240 115 220 Z"/>
  </g>

  <!-- Placeholder text -->
  <text x="150" y="280" text-anchor="middle" fill="#f0f0f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Your Photo Here</text>
</svg>